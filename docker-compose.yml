services:
  spiel:
    env_file: .env
    build: ./spiel-backend
    volumes:
      - ./syzygy:/syzygy:ro
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  endspielbot:
    build: ./endspielbot
    env_file: .env
    depends_on:
      - spiel
  postgres:
    image: postgres:18
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    expose:
      - "5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
volumes: 
  postgres_data:
