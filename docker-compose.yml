services:
  spiel:
    restart: always
    env_file: .env
    build: ./spiel-backend
    volumes:
      - ./syzygy:/spiel/syzygy:ro
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy

  endspielbot:
    restart: always
    build: ./endspielbot
    env_file: .env
    depends_on:
      - spiel
  postgres:
    image: postgres:18
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - spiel    
volumes: 
  postgres_data:
